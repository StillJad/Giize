services:
  giize-bot:
    container_name: giize-bot
    build: .
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    expose:
      - "3001"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- --header=\"x-dashboard-secret: $$DASHBOARD_INTERNAL_SECRET\" http://127.0.0.1:3001/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  giize-dashboard:
    container_name: giize-dashboard
    build:
      context: ./apps/dashboard
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DASHBOARD_BOT_API_URL: http://giize-bot:3001
    depends_on:
      giize-bot:
        condition: service_healthy
    expose:
      - "3000"
    ports:
      - "${DASHBOARD_HOST_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000 >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
